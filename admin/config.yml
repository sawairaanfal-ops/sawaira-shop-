backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "products"
    label: "Products"
    files:
      - file: "products.json"
        label: "Product Catalog"
        name: "catalog"
        fields:
          - label: "Products"
            name: "items"
            widget: "list"
            summary: "{{fields.name}} — Rs {{fields.price}}"
            fields:
              - { label: "ID (unique number, never reuse)", name: "id", widget: "number", value_type: "int" }
              - { label: "Product Name", name: "name", widget: "string" }
              - label: "Category"
                name: "cat"
                widget: "select"
                options: ["Necklaces", "Bracelets", "Earrings", "Anklets", "Keychains", "Rings", "Nails"]
              - { label: "Price (Rs)", name: "price", widget: "number", value_type: "int" }
              - { label: "Accent Color (leave as-is if unsure)", name: "color", widget: "color", default: "#E893AC" }
              - { label: "Product Photo", name: "img", widget: "image", required: false, hint: "Upload a photo here — it will replace the placeholder icon." }
